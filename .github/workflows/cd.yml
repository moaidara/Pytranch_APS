# CD : build de l'image Docker et push vers GitHub Container Registry (ghcr.io).
# L'image pourra ensuite être déployée (Azure, VPS, etc.) en tirant depuis ghcr.io.

name: CD

on:
  push:
    branches: [main]
  # Décommenter pour publier aussi sur les tags (ex. v1.0.0) :
  # workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: meta
        run: |
          echo "registry=ghcr.io" >> $GITHUB_OUTPUT
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$owner" >> $GITHUB_OUTPUT
          echo "image=$owner/paytranch" >> $GITHUB_OUTPUT
          echo "tags=$owner/paytranch:latest,$owner/paytranch:sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.image }}:latest
            ghcr.io/${{ steps.meta.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
