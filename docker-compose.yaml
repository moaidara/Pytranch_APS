services:
  paytranch:
    build:
      context: .
      dockerfile: Dockerfile
    image: paytranch:latest
    container_name: paytranch
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
    # Pour surcharger avec un fichier .env (ne pas le versionner) :
    # env_file:
    #   - .env
